<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <title>University Employee Management System</title>
  <style>
    .col-4 {
      transform: scale(0.95);
      transition: 1s;
    }

    .col-4:hover {
      transform: scale(1);
      transition: 1s;
    }

    p {
      text-align: justify;
      padding: 10px;
    }

    .text {
      padding: 5px;
      background-color: cadetblue;
    }

    .back_img {
      margin-left: 0;
      border-radius: 2px;
      min-height: 700px;
    }

    img {
      width: 100%;
      height: 400px;
    }
    body{
      background-image: url(https://images.pexels.com/photos/50711/board-electronics-computer-data-processing-50711.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2);
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
    }
  </style>
</head>

<body>
  <div class="container mt-3 text-center">
    <h1 class="text-dark"><i class="bi bi-book-fill"> Books</i></h1>
    <hr>
    <div class="row">
      {% for book in books %}
      <div class="col-4 back_img">
        <img src="{{ book.cover.url }}" />
        <div class="text">
          <h3>{{book.Title}}</h3>
          <p>{{book.description}}</p>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

</body>

<!-- Optional JavaScript; choose one of the two! -->

<!-- Option 1: Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
</body>

</html>
