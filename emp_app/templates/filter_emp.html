<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <title>Filter an Employee from System</title>
        <style>
      body{
        background-image: url(https://images.pexels.com/photos/7437489/pexels-photo-7437489.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2);
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover;
      }
      
    </style>

</head>

<body>
    <div class="container mt-3 text-center">
        <h1 class="text-warning"><b><u><i class="bi bi-person-lines-fill"></i>  Filtering University Employee Management System</u></b></h1>
        <hr>
        <form action = "/filter_emp" method = "post">
            {% csrf_token%}
        <label for="first_name"><b>Employee First/last Name</b></label><br>
        <input type="text" id="name" name="name" placeholder="Enter your First/Last name"
            value="{{name}}"><br>

        <label for="dept"><b>Department</b></label><br>
        <input type="text" id="dept" name="dept" placeholder="Enter your Department" value="{{dept}}"><br>

        <label for="role"><b>Role</b></label><br>
        <input type="text" id="role" name="role" placeholder="Enter you salary" value="{{role}}"><br>
        <br>

        <button type="submit" class="btn btn-warning mt-3">Filtering University Employee</button>
        </form>

    </div>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
</body>

</html>
