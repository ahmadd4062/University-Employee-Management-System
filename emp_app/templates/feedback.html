<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <style>
    body {
      background-image: url(https://media.istockphoto.com/id/1302359276/photo/feedback-coming-out-from-yellow-megaphone-on-blue-background-survey-and-questionnaire-concept.jpg?s=170667a&w=0&k=20&c=kuRUH8UJA2k9oYjk_3DX7WWzJG84TDt1mMqrRB0-l_s=);
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
    }

    input{
      border-radius: 10px;
      padding:10px;
      margin-top: 10px;
      width:40%;
      border: none;
      outline: none;
    }

    input:focus{
      transform:scale(1.02);
      box-shadow: 0px 0px 5px rgba(0,0,0,0.2)
    }

    label{
      display:flex;
      justify-content: flex-start;
      align-items: center;
      width: 150px;
      font-weight: bolder;
      font-size: 20px;
      color: black;
      padding: 10px 10px 0px 4px;     
    }

    form{
      display:flex;
      justify-content: center;
      flex-direction: column;
    }

    ::placeholder{
      padding-left: 20px;
    }


    button{
      width:200px;
      margin:10px auto;
    }

    .data{
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
  <title>University Employee Feedback</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body>
    <h1 class="text-center"><b><u>Feedback Form</h1></u></b><br><br><br>
  <div class="container bg-transparent" >
    <form action="/feedback" method="post">
    {% csrf_token %}
   <div class="data"><label for="name" >Name</label><br>
   <input type="text" id="name" name="name" placeholder="Enter Your Name" value="{{name}}"><br></div>

   <div class="data"><label for="email">Email</label><br>
   <input type="text" id="email" name="email" placeholder="Enter Email" value="{{email}}"><br></div>

   <div class="data"> <label for="content" >Content</label><br>
   <input type="text" id="content" name="content" placeholder="Enter Content" value="{{content}}"><br></div>

   <br>
 <button type="submit" class="btn btn-success"> <i class="bi bi-person-add"></i> Add Employee Feedback</button>
</form>
</div>

     <!-- Optional JavaScript; choose one of the two! -->

  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
  crossorigin="anonymous"></script>

<!-- Option 2: Separate Popper and Bootstrap JS -->
<!--
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
  -->
</body>

</html>
