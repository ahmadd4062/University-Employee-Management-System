<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
  integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <title>Add employee </title>
    <style>
      body{
        background-image: url(https://images.pexels.com/photos/1181243/pexels-photo-1181243.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2);
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover;
      }
      
    </style>
    
    
</head>
<body>
    <div class="container mt-3 text-center">
        <h1 class="text-danger"><b><u><i class="bi bi-person-plus-fill"></i>Adding University Employee Management System</u></b></h1>
        <hr>
        <form action="/add_emp" method="post">
          {% csrf_token %}
         
            <div class="data"><label for="first_name"><b>First Name</b></label>
            <input type="text" class="mx-3" id="first_name" name="first_name" placeholder="Enter your first name" value="{{first_name}}"><br></div><br>
           
            <div class="data"><label for="last_name"><b>Last Name</b></label>
            <input type="text" class="mx-3" id="last_name" name="last_name" placeholder="Enter your last name" value="{{last_name}}"><br></div><br>

            <div class="data mx-3"><label for="salaary"><b>Salary</b></label>
            <input type="number" id="salaary" name="salaary" placeholder="Enter you salary" value="{{salaary}}"><br></div><br>

            <div class="data"><label for="dept"><b>Department</b></label>
            <input type="number" id="dept" name="dept" placeholder="Enter your Department" value="{{dept}}"><br></div><br>

            <div class="data"><label for="role"><b>Role</b></label>
            <input type="number"id="role" name="role" placeholder="Enter your role" value="{{role}}"><br></div><br>

            <div class="data"><label for="bonus"><b>Bonus</b></label>
            <input type="number" id="bonus" name="bonus" placeholder="Enter your bonus" value="{{bonus}}"><br></div><br>

            <div class="data"><label for="phone"><b>Phone</b></label>
            <input type="number" id="phone" name="phone" placeholder="Enter your Phone" value="{{phone}}"><br></div><br>
          
            
          <button type="submit" class="btn btn-primary mt-3">Submit</button>
</form>
          




    </div>

     <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
</body>

</html>
