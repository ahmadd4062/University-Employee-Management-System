<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <style>
    body {
      background-image: url(https://images.unsplash.com/photo-1582653291997-079a1c04e5a1?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80);
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
    }
    input{
      border-radius: 10px;
      padding:10px;
      margin-top: 10px;
      width:40%;
      border: none;
      outline: none;

    }

    input:focus{
      transform:scale(1.02);
      box-shadow: 0px 0px 5px rgba(0,0,0,0.2)
    }

    label{
      display:flex;
      justify-content: flex-start;
      align-items: center;
      width: 150px;
      font-weight: bolder;
      font-size: 20px;
      color: black;
      padding: 10px 10px 0px 4px;     
    }

    form{
      display:flex;
      justify-content: center;
      flex-direction: column;
    }

    ::placeholder{
      padding-left: 20px;
    }


    button{
      width:200px;
      margin:10px auto;
    }

    .data{
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
  <title>University Employee Managment System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body>
  <h1 class="text-center"><b><u>Add Employee Meeting</u></b></h1><br><br><br>
  <form action="/meeting" method="post">
    {% csrf_token %}
   <div class="data"><label for="name" > Name</label><br>
   <input type="text" id="name" name="name" placeholder="Enter Your Name" value="{{name}}"><br></div>

   <div class="data"><label for="description" style="color:aquamarine" >Description</label><br>
   <input type="text" id="description" name="description" style="border: 2px solid; border-color: black; " placeholder="Enter Description" value="{{description}}"><br></div>

   <div class="data"><label for="dept" >Department</label><br>
   <input type="text" id="dept" name="dept" style="border: 2px solid; border-color: black; "  placeholder="Enter Your Department" value="{{dept}}"><br></div>

   <div class="data"><label for="start_time" > Start Time</label><br>
   <input type="datetime-local" id="start_time" name="start_time" placeholder="Meeting Start Time" value="{{start_time}}"><br></div>

   <div class="data"><label for="end_time" > End Time</label><br>
   <input type="datetime-local" id="end_time" name="end_time" placeholder="Meeting End Time" value="{{end_time}}"><br></div>

   

   <br>
 
 <button type="submit" class="btn btn-primary"> <i class="bi bi-person-add"></i> Adding Meeting</button>
</form>
</div>
     <!-- Optional JavaScript; choose one of the two! -->

  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
  crossorigin="anonymous"></script>

<!-- Option 2: Separate Popper and Bootstrap JS -->
<!--
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
  -->
</body>

</html>
